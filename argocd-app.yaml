apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: june12-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Arunkumar230296/june12-app.git
    targetRevision: main
    path: june12-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
